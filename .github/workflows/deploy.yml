name: Deploy to DreamHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.github'
          path: ./
          remote_path: /home/romafederico/romafederico.com/
          remote_host: pdx1-shared-a1-22.dreamhost.com
          remote_user: romafederico
          remote_key: ${{ secrets.DREAMHOST_SSH_KEY }}
